{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Sharing</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
        integrity="sha512-iBBXm8fW90+nuLcSKlbmrPcLa0OT92xO1BIsZ+ywDWZCvqsWgccV3gFoRBv0z+8dLJgyAHIhR35VZc2oM/gI1w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");

        *,
        *::after,
        *::before {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        .html {
            font-size: 62.5%;
        }

        body {
            font-family: "Poppins", sans-serif;
            padding-top: 64px; /* To prevent overlap with fixed navbar */
        }

        /* ///////////..utility classes../////////// */

        .container {
            max-width: 1200px;
            width: 90%;
            margin: auto;
        }

        .btn {
            display: inline-block;
            padding: 0.5em 1.5em;
            text-decoration: none;
            border-radius: 50px;
            cursor: pointer;
            outline: none;
            margin-top: 1em;
            text-transform: uppercase;
            font-weight: small;
        }

        .btn-primary {
            color: #fff;
            background: #16a083;
        }

        .btn-primary:hover {
            background: #117964;
            transition: background 0.3s ease-in-out;
        }

        /* ............/navbar/............ */

        .navbar input[type="checkbox"],
        .navbar .hamburger-lines {
            display: none;
        }

        .navbar {
            box-shadow: 0px 5px 10px 0px #aaa;
            position: fixed;
            width: 100%;
            background: #fff;
            color: #000;
            opacity: 0.85;
            height: 50px;
            z-index: 12;
        }

        .navbar-container {
            display: flex;
            justify-content: space-between;
            height: 64px;
            align-items: center;
        }

        .menu-items {
            order: 2;
            display: flex;
        }

        .menu-items li {
            list-style: none;
            margin-left: 1.5rem;
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }

        .menu-items a {
            text-decoration: none;
            color: #444;
            font-weight: 500;
            transition: color 0.3s ease-in-out;
        }

        .menu-items a:hover {
            color: #117964;
            transition: color 0.3s ease-in-out;
        }

        .logo {
            order: 1;
            font-size: 2.3rem;
            margin-bottom: 0.5rem;
        }

        #footer h2 {
            text-align: center;
            font-size: 1.8rem;
            padding: 2.6rem;
            font-weight: 500;
            color: #fff;
            background: rgb(65, 65, 65);
        }

        /* Mobile & Tablet Responsiveness */

        /* For small devices (phones, 600px or smaller) */
        @media screen and (max-width: 600px) {
            .html {
                font-size: 50%;
            }

            .navbar-container {
                flex-direction: column;
                align-items: flex-start;
                height: auto;
            }

            .menu-items {
                flex-direction: column;
                margin-top: 1em;
                display: none; /* Hidden by default */
                width: 100%;
            }

            .menu-items li {
                margin-left: 0;
                margin-bottom: 0.8rem;
                text-align: left;
                width: 100%;
            }

            .logo {
                font-size: 1.8rem;
                margin-bottom: 1rem;
            }

            #footer h2 {
                font-size: 1.4rem;
                padding: 1.5rem;
            }

            /* Show hamburger menu when clicked */
            .navbar input[type="checkbox"]:checked ~ .menu-items {
                display: flex;
            }

            .hamburger-lines {
                display: block;
                cursor: pointer;
            }

            .hamburger-lines span {
                display: block;
                background-color: #000;
                height: 3px;
                width: 25px;
                margin: 5px;
            }
        }

        /* For medium devices (tablets, 600px to 900px) */
        @media screen and (max-width: 900px) {
            .html {
                font-size: 55%;
            }

            .navbar-container {
                flex-direction: column;
                align-items: flex-start;
                height: auto;
            }

            .menu-items {
                flex-direction: column;
                margin-top: 1em;
            }

            .menu-items li {
                margin-left: 0;
                margin-bottom: 1rem;
            }

            .logo {
                font-size: 2rem;
            }

            #footer h2 {
                font-size: 1.6rem;
                padding: 2rem;
            }
        }

        /* For large devices (laptops and desktops, 900px or larger) */
        @media screen and (min-width: 900px) {
            .html {
                font-size: 62.5%;
            }

            .navbar-container {
                flex-direction: row;
                align-items: center;
                height: 64px;
            }

            .menu-items {
                flex-direction: row;
                margin-top: 0;
            }

            .menu-items li {
                margin-left: 1.5rem;
                margin-bottom: 0.5rem;
            }

            .logo {
                font-size: 2.3rem;
            }

            #footer h2 {
                font-size: 1.8rem;
                padding: 2.6rem;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="navbar-container container">
            <input type="checkbox" name="" id="menu-toggle">
            <div class="hamburger-lines">
                <span class="line line1"></span>
                <span class="line line2"></span>
                <span class="line line3"></span>
            </div>
            <ul class="menu-items">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#testimonials">Testimonial</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <h1 class="logo">Secure Sharing</h1>
        </div>
    </nav>

    <!-- Main content area -->
    {% block content %}
    {% endblock %}

    <footer id="footer">
        <h2>Secure Sharing &copy; all rights reserved</h2>
    </footer>

    <!-- JS Code for smooth scrolling -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script>
        $(document).ready(function () {
            // Add smooth scrolling to all links
            $("a").on("click", function (event) {
                if (this.hash !== "") {
                    event.preventDefault();
                    var hash = this.hash;

                    $("html, body").animate({
                        scrollTop: $(hash).offset().top,
                    }, 800, function () {
                        window.location.hash = hash;
                    });
                }
            });
        });
    </script>
</body>

</html>
